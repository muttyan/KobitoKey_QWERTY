# ポインティングデバイス（右手側）を有効化
# 右側にトラックボール/センサーが載っている構成なら必須
CONFIG_ZMK_POINTING=y

# NFC 用に予約されているピンを GPIO として使用可能にする
# nRF52系でピンが足りないときに有効
CONFIG_NFCT_PINS_AS_GPIOS=y

# Bluetooth Low Energy を有効化
# Peripheral 側も Central 側と BLE で接続するため基本的に必要
# （ただし設計によっては片側だけ BLE を使う構成もあり得るが、一般的に Split BLE では両側有効）
CONFIG_ZMK_BLE=y

# マウス入力（HID Mouse）を有効化
# 右側センサーの移動量をマウスレポートとして扱うために必要
CONFIG_ZMK_MOUSE=y


# SPI バスを有効化
# PMW3610 は SPI 接続のため必須
CONFIG_SPI=y

# Zephyr Input サブシステムを有効化
# センサー入力をイベント処理するために必要
CONFIG_INPUT=y


# PMW3610 光学センサーを有効化（右手側）
CONFIG_PMW3610=y

# X軸反転をしない
# 左手側は取り付け向きの都合で反転していたが、右手側は素直な向きという設計
# 左右で基板向き・センサー回転が異なる場合、ここで整合を取る
CONFIG_PMW3610_INVERT_X=n

# PMW3610 のスマートアルゴリズムを有効化
# 滑らかさ・微小移動の補正。体感品質が上がるが処理負荷は微増
CONFIG_PMW3610_SMART_ALGORITHM=y

# 最小レポート間隔（ms）
# 12ms は追従性と消費電力のバランス型
# もっとヌルヌルにしたければ小さく、電池持ち優先なら大きく
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12


# 入力スレッドのスタックサイズ増量（右手側）
# ポインティング + input イベント処理でスタック不足（ハードフォルト等）を避ける目的
# Peripheral 側でもセンサー処理が走るので増やす判断は妥当
CONFIG_INPUT_THREAD_STACK_SIZE=1024 


# バッテリー残量レポートを有効化
# Peripheral 側自身の残量を取得できるようにする
# ※Central 側で「左右の残量をホストへ代理送信」するには、左手側の PROXY/FETCHING 設定が効く
CONFIG_ZMK_BATTERY_REPORTING=y


# BLE 送信出力を上げて接続安定性を改善
# Split の左右間リンク（Peripheral⇔Central）や、環境ノイズが強いときに効果
# ただし消費電力が増えるので「不安定な時だけ」が基本方針
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y


# アイドル→スリープ設定（左手と同じ）
# 900000ms = 15分でアイドル扱い
CONFIG_ZMK_IDLE_TIMEOUT=900000

# スリープ機能を有効化（省電力）
CONFIG_ZMK_SLEEP=y

# 1800000ms = 30分でスリープへ移行
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
