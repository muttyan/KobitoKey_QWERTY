# キーボード名
# ZMK Studio やログ、BLE デバイス名のベースとして使用される
CONFIG_ZMK_KEYBOARD_NAME="KobitoKey"


# ポインティングデバイス（トラックボール・トラックパッド等）を有効化
# ZMK にマウス系入力（X/Y移動、スクロール等）を統合するために必須
CONFIG_ZMK_POINTING=y

# NFC 用に予約されているピンを GPIO として使用可能にする
# PMW3610 等でピン数が厳しい場合に有効
CONFIG_NFCT_PINS_AS_GPIOS=y

# Bluetooth Low Energy を有効化
# 無線キーボードとして動作させるための必須設定
CONFIG_ZMK_BLE=y

# マウス入力（HID Mouse）を有効化
# ポインティングデバイスの座標を BLE HID として送信するために必要
CONFIG_ZMK_MOUSE=y


# ZMK Studio（PC からのリアルタイム設定ツール）を有効化
# レイヤー状態やデバッグ用途で便利
CONFIG_ZMK_STUDIO=y

# Studio の操作ロック機能を無効化
# n にすることで、常に Studio からの操作を受け付ける
CONFIG_ZMK_STUDIO_LOCKING=n


# SPI バスを有効化
# PMW3610（SPI 接続の光学センサー）を使用するために必須
CONFIG_SPI=y

# Zephyr の Input サブシステムを有効化
# センサー入力やマウス入力をイベントとして扱うために必要
CONFIG_INPUT=y


# PMW3610 光学センサーを有効化
# 高性能なトラックボール・トラックパッド用センサー
CONFIG_PMW3610=y

# X 軸の移動方向を反転
# 実装向き（センサーの取り付け方向）に合わせるための調整
CONFIG_PMW3610_INVERT_X=y

# PMW3610 のスマートアルゴリズムを有効化
# 微細な動きの補正や滑らかなカーソル移動を行う
CONFIG_PMW3610_SMART_ALGORITHM=y

# 最小レポート間隔（ms）
# 値を小さくすると追従性向上、CPU負荷・消費電力は増加
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12


# 入力処理用スレッドのスタックサイズ
# ポインティング + センサー + Split 構成ではデフォルト（512～1024）だと
# スタック不足を起こす可能性があるため拡張
CONFIG_INPUT_THREAD_STACK_SIZE=1024


# センサー回転補正を有効化
# トラックボールを斜め・縦向きに配置する場合に使用
CONFIG_SENSOR_ROTATION=y


# バッテリー残量レポートを有効化
# BLE HID の Battery Service を通じて OS に残量を通知
CONFIG_ZMK_BATTERY_REPORTING=y

# Split 構成で、中央（Central）が左右のバッテリー情報を代理送信
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Central が Peripheral から定期的にバッテリー情報を取得
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y


# Split キーボード構成で、この側を Central として動作させる
# BLE 接続・ホストとの通信を担当
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y


# BLE コントローラの送信出力設定
# 出力を上げるほど接続は安定するが、消費電力が増える
# 不安定な場合のみ段階的に有効化するのが推奨

# +8dBm（かなり強い。バッテリー消費大）
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# +4dBm（バランス型）
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# BLE ペアリング時のパスキー入力を無効化
# ヘッドレスデバイス（画面なし）向け設定
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n


# Split 通信タスク用のスタックサイズ
# センサー・バッテリー同期を含む場合、余裕を持たせる
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=1024

# Split 通信キューのサイズ
# 同期イベントが多い場合の詰まり防止
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_QUEUE_SIZE=20


# アイドル状態になるまでの時間（ms）
# 900000ms = 15分
CONFIG_ZMK_IDLE_TIMEOUT=900000

# スリープ機能を有効化
# バッテリー消費を大きく削減
CONFIG_ZMK_SLEEP=y

# アイドル状態からスリープに入るまでの時間（ms）# 1800000ms = 30分
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000


# RGB LED ウィジェット（ZMK Studio / デバッグ用）を有効化
CONFIG_RGBLED_WIDGET=y

# ウィジェットの更新間隔（ms）
# 更新頻度を下げることで消費電力を抑える
CONFIG_RGBLED_WIDGET_INTERVAL_MS=2000


# バッテリー残量に応じた表示しきい値（％）
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=60
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10


# レイヤーごとの色表示を有効化
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

# 各レイヤーに割り当てる色インデックス
# ZMK のカラーパレット定義に依存
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=4
